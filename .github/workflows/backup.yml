name: Nightly DB Backup

on:
  schedule:
    - cron: "0 2 * * *"   # 02:00 UTC daily (07:30 IST)
  workflow_dispatch:       # allow manual trigger from GitHub Actions UI

jobs:
  backup:
    name: MongoDB Backup
    runs-on: ubuntu-latest
    # Only run when S3_BACKUP_BUCKET secret is configured; skip silently otherwise
    if: vars.BACKUP_ENABLED == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ai-learning-backend/backend/package-lock.json

      - name: Install backend dependencies
        working-directory: ai-learning-backend/backend
        run: npm ci --omit=dev

      - name: Install mongodump (MongoDB Database Tools)
        run: |
          wget -qO - https://www.mongodb.org/static/pgp/server-7.0.asc | sudo apt-key add -
          echo "deb [ arch=amd64,arm64 ] https://repo.mongodb.org/apt/ubuntu jammy/mongodb-org/7.0 multiverse" | sudo tee /etc/apt/sources.list.d/mongodb-org-7.0.list
          sudo apt-get update -qq
          sudo apt-get install -y mongodb-database-tools

      - name: Run backup
        working-directory: ai-learning-backend/backend
        env:
          MONGO_URI:          ${{ secrets.MONGO_URI }}
          S3_BACKUP_BUCKET:   ${{ secrets.S3_BACKUP_BUCKET }}
          S3_BACKUP_PREFIX:   ${{ vars.S3_BACKUP_PREFIX || 'backups' }}
          BACKUP_RETAIN_DAYS: ${{ vars.BACKUP_RETAIN_DAYS || '7' }}
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION:    ${{ vars.AWS_REGION || 'ap-south-1' }}
        run: node scripts/backup.js

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Nightly backup FAILED. Check the run log and verify MONGO_URI + S3 secrets."
