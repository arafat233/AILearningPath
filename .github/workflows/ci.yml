name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    name: Backend — lint & test
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports: ["27017:27017"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ai-learning-backend/backend/package-lock.json

      - name: Install backend deps
        working-directory: ai-learning-backend/backend
        run: npm ci

      - name: Run backend tests
        working-directory: ai-learning-backend/backend
        run: npm test --if-present
        env:
          NODE_ENV: test
          MONGO_URI: mongodb://localhost:27017/ai_learning_test
          JWT_SECRET: ci_test_secret_not_real
          ANTHROPIC_API_KEY: sk-ant-ci-placeholder
          FRONTEND_URL: http://localhost:5173

  frontend-build:
    name: Frontend — build check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ai-learning-frontend/frontend/package-lock.json

      - name: Install frontend deps
        working-directory: ai-learning-frontend/frontend
        run: npm ci

      - name: Build frontend
        working-directory: ai-learning-frontend/frontend
        run: npm run build
        env:
          VITE_API_URL: http://localhost:5000
