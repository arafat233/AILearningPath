name: CI

on:
  push:
    branches: [main, "cursor/**"]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports: ["27017:27017"]
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ai-learning-backend/backend/package-lock.json

      - name: Install backend dependencies
        working-directory: ai-learning-backend/backend
        run: npm ci

      - name: Run backend tests
        working-directory: ai-learning-backend/backend
        env:
          MONGO_URI: mongodb://localhost:27017/ai_learning_test
          JWT_SECRET: test_secret_for_ci_only
          ANTHROPIC_API_KEY: sk-ant-test-key
          NODE_ENV: test
        run: npm test

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ai-learning-frontend/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ai-learning-frontend/frontend
        run: npm ci

      - name: Build frontend
        working-directory: ai-learning-frontend/frontend
        run: npm run build
        env:
          VITE_API_URL: http://localhost:5001/api
