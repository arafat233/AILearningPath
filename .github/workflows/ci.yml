name: CI

on:
  push:
    branches: [main, "cursor/**"]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports: ["27017:27017"]
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ai-learning-backend/backend/package-lock.json

      - name: Install backend dependencies
        working-directory: ai-learning-backend/backend
        run: npm ci

      - name: Audit backend dependencies
        working-directory: ai-learning-backend/backend
        run: npm audit --audit-level=high

      - name: Run backend unit tests
        working-directory: ai-learning-backend/backend
        env:
          MONGO_URI: mongodb://localhost:27017/ai_learning_test
          JWT_SECRET: test_secret_for_ci_only
          ANTHROPIC_API_KEY: sk-ant-test-key
          NODE_ENV: test
        run: npm test

      - name: Run backend integration tests
        working-directory: ai-learning-backend/backend
        env:
          MONGO_URI: mongodb://localhost:27017/ai_learning_test
          JWT_SECRET: test_secret_for_ci_only
          ANTHROPIC_API_KEY: sk-ant-test-key
          NODE_ENV: test
        run: npm run test:integration

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ai-learning-frontend/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ai-learning-frontend/frontend
        run: npm ci

      - name: Audit frontend dependencies
        working-directory: ai-learning-frontend/frontend
        run: npm audit --audit-level=high

      - name: Run frontend tests
        working-directory: ai-learning-frontend/frontend
        run: npm run test -- --run
        env:
          VITE_API_URL: http://localhost:5001/api

      - name: Build frontend
        working-directory: ai-learning-frontend/frontend
        run: npm run build
        env:
          VITE_API_URL: http://localhost:5001/api

  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [frontend-build]

    services:
      mongodb:
        image: mongo:7
        ports: ["27017:27017"]
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            ai-learning-backend/backend/package-lock.json
            ai-learning-frontend/frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: ai-learning-backend/backend
        run: npm ci

      - name: Start backend
        working-directory: ai-learning-backend/backend
        env:
          MONGO_URI: mongodb://localhost:27017/ai_learning_e2e
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test_secret_for_ci_only
          JWT_REFRESH_SECRET: refresh_secret_for_ci_only
          ANTHROPIC_API_KEY: sk-ant-test-key
          NODE_ENV: test
          PORT: 5001
          FRONTEND_URL: http://localhost:4173
        run: node server.js &

      - name: Install frontend dependencies
        working-directory: ai-learning-frontend/frontend
        run: npm ci

      - name: Build frontend
        working-directory: ai-learning-frontend/frontend
        run: npm run build
        env:
          VITE_API_URL: http://localhost:5001/api

      - name: Install Playwright browsers
        working-directory: ai-learning-frontend/frontend
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        working-directory: ai-learning-frontend/frontend
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:4173
          CI: "true"
        run: |
          npx vite preview --port 4173 &
          sleep 3
          npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: ai-learning-frontend/frontend/playwright-report/

  deploy:
    name: Deploy to Production
    needs: [backend-test, frontend-build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_SSH_KEY }}
          port:     ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -e
            cd /opt/ai-learning
            git pull origin main
            cd ai-learning-backend/backend && npm ci --omit=dev
            cd /opt/ai-learning/ai-learning-frontend/frontend
            npm ci && npm run build
            pm2 reload ecosystem.config.cjs --env production
