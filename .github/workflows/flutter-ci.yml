name: Flutter CI

on:
  push:
    branches: [main]
    paths: ['ai-learning-mobile/**']
  pull_request:
    branches: [main]
    paths: ['ai-learning-mobile/**']

jobs:
  lint-and-test:
    name: Lint & Test Flutter App
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-learning-mobile

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .
        continue-on-error: true

      - name: Analyze code
        run: flutter analyze
        continue-on-error: true

      - name: Run tests
        run: flutter test
        continue-on-error: true

      - name: Build APK (debug)
        run: flutter build apk --debug
