name: Health Check

on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 minutes
  workflow_dispatch:          # manual trigger from GitHub UI

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Check stellaredu.in
        id: check
        run: |
          STATUS=$(curl -s -o /tmp/body.txt -w "%{http_code}" --max-time 20 https://stellaredu.in/api/health)
          BODY=$(cat /tmp/body.txt | head -c 300)
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "body=$BODY"     >> $GITHUB_OUTPUT

          if [ "$STATUS" != "200" ]; then
            echo "::error::Health check FAILED — HTTP $STATUS"
            exit 1
          fi
          echo "OK — HTTP $STATUS"

      - name: Send down alert via Resend
        if: failure() && env.RESEND_API_KEY != ''
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          STATUS="${{ steps.check.outputs.status }}"
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')

          curl -s -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer $RESEND_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{
              \"from\": \"alerts@resend.dev\",
              \"to\": \"najeebarafat@gmail.com\",
              \"subject\": \"[Stellar] stellaredu.in is DOWN\",
              \"html\": \"<div style='font-family:sans-serif;max-width:500px;padding:24px'><h2 style='color:#ff3b30;margin:0 0 16px'>stellaredu.in is not responding</h2><table style='font-size:14px;width:100%'><tr><td style='color:#636366;padding:4px 0'>Time</td><td><strong>$TIMESTAMP</strong></td></tr><tr><td style='color:#636366;padding:4px 0'>HTTP Status</td><td><strong>${STATUS:-timeout}</strong></td></tr><tr><td style='color:#636366;padding:4px 0'>URL</td><td>https://stellaredu.in/api/health</td></tr></table><p style='margin-top:20px;font-size:13px;color:#636366'>SSH: <code>ssh -i ssh-key-2026-05-01.key ubuntu@144.24.154.247</code><br>Then: <code>cd AILearningPath && docker-compose up -d</code></p></div>\"
            }"
