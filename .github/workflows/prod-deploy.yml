name: Production Deploy

on:
  # Auto-deploy every push to main
  push:
    branches: [main]
  # Keep manual trigger for hotfixes / forced deploys
  workflow_dispatch:
    inputs:
      skip_smoke_test:
        description: "Skip the post-deploy smoke test (emergency only)"
        type: boolean
        default: false

concurrency:
  group: prod-deploy
  cancel-in-progress: false  # Never cancel a prod deploy mid-flight

permissions:
  contents: read
  packages: write   # needed to push to ghcr.io

jobs:
  # ── Job 1: Preflight ──────────────────────────────────────────────────────
  preflight:
    name: Preflight checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Block deploy if critical files are untracked or modified
        run: bash scripts/preflight-check.sh

  # ── Job 2: Build frontend on CI (fast — npm cache, plenty of RAM) ─────────
  build-frontend:
    name: Build frontend
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ai-learning-frontend/frontend/package-lock.json

      - name: Install dependencies
        working-directory: ai-learning-frontend/frontend
        run: npm ci --legacy-peer-deps

      - name: Build (postbuild bumps SW cache key)
        working-directory: ai-learning-frontend/frontend
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: ai-learning-frontend/frontend/dist
          retention-days: 7

  # ── Job 3: Build backend Docker image on CI and push to ghcr.io ──────────
  build-backend:
    name: Build backend image
    needs: preflight
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/ailearningpath-api
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push (with layer cache — npm ci cached between builds)
        uses: docker/build-push-action@v6
        with:
          context: ./ai-learning-backend
          file: ./ai-learning-backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          # GitHub Actions cache: npm ci layer survives across runs
          # when package.json hasn't changed (~30s vs 16min cold)
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 4: Deploy ─────────────────────────────────────────────────────────
  deploy:
    name: Deploy to production
    needs: [build-frontend, build-backend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: ./dist

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PROD_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.PROD_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Upload frontend dist to server
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            ./dist/ \
            ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }}:/tmp/stellar-dist/

      - name: Run server-side deploy script
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }} \
            "GHCR_TOKEN='$GHCR_TOKEN' GHCR_USER='$GHCR_USER' bash -s" < scripts/prod-deploy.sh

      - name: Smoke test
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.skip_smoke_test }}
        run: bash scripts/smoke-test.sh https://stellaredu.in

      - name: Auto-rollback on failure
        if: failure()
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }} \
            'bash -s' < scripts/prod-rollback.sh

      - name: Summary
        if: success()
        run: |
          echo "## ✅ Production deploy complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: https://stellaredu.in" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
