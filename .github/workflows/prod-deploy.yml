name: Production Deploy

on:
  # Auto-deploy every push to main
  push:
    branches: [main]
  # Keep manual trigger for hotfixes / forced deploys
  workflow_dispatch:
    inputs:
      skip_smoke_test:
        description: "Skip the post-deploy smoke test (emergency only)"
        type: boolean
        default: false

concurrency:
  group: prod-deploy
  cancel-in-progress: false  # Never cancel a prod deploy mid-flight

permissions:
  contents: read
  packages: write   # needed to push to ghcr.io

jobs:
  # ── Job 1: Preflight ──────────────────────────────────────────────────────
  preflight:
    name: Preflight checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Block deploy if critical files are untracked or modified
        run: bash scripts/preflight-check.sh

  # ── Job 2: Build frontend on CI (fast — npm cache, plenty of RAM) ─────────
  build-frontend:
    name: Build frontend
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ai-learning-frontend/frontend/package-lock.json

      - name: Install dependencies
        working-directory: ai-learning-frontend/frontend
        run: npm ci --legacy-peer-deps

      - name: Run frontend tests
        working-directory: ai-learning-frontend/frontend
        # e2e/*.spec.js are Playwright specs (need a live stack) — run them in a
        # dedicated stage, not here. test:ci excludes them so vitest runs units only.
        run: npm run test:ci

      - name: Build (postbuild bumps SW cache key)
        working-directory: ai-learning-frontend/frontend
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: ai-learning-frontend/frontend/dist
          retention-days: 7

  # ── Job 3: Build backend Docker image on CI and push to ghcr.io ──────────
  build-backend:
    name: Build backend image
    needs: preflight
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ai-learning-backend/backend/package-lock.json

      - name: Install backend dependencies
        working-directory: ai-learning-backend/backend
        # --legacy-peer-deps: rate-limit-redis@5 declares peer express-rate-limit
        # >=8.5 but the app pins ^7.1.5 (works at runtime; v5 RedisStore is
        # compatible). Matches the resolution npm install already uses locally.
        run: npm ci --legacy-peer-deps

      - name: Run backend tests
        working-directory: ai-learning-backend/backend
        run: npm test -- --passWithNoTests

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/ailearningpath-api
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push (with layer cache — npm ci cached between builds)
        uses: docker/build-push-action@v6
        with:
          context: ./ai-learning-backend
          file: ./ai-learning-backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          # GitHub Actions cache: npm ci layer survives across runs
          # when package.json hasn't changed (~30s vs 16min cold)
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 4: Deploy ─────────────────────────────────────────────────────────
  deploy:
    name: Deploy to production
    needs: [build-frontend, build-backend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: ./dist

      - name: Setup SSH
        run: |
          # Validate secrets are present (names only — never echo the values)
          [ -n "${{ secrets.PROD_SSH_KEY }}" ] || { echo "::error::PROD_SSH_KEY secret is empty/unset"; exit 1; }
          [ -n "${{ secrets.PROD_HOST }}" ]    || { echo "::error::PROD_HOST secret is empty/unset"; exit 1; }
          [ -n "${{ secrets.PROD_USER }}" ]    || { echo "::error::PROD_USER secret is empty/unset"; exit 1; }
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.PROD_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # Fail early with a clear message if the key text is malformed (the
          # #1 cause: line breaks lost when pasting the PEM into the secret).
          if ! ssh-keygen -y -f ~/.ssh/deploy_key > /dev/null 2>&1; then
            echo "::error::PROD_SSH_KEY is not a valid OpenSSH private key — re-paste it preserving line breaks (the whole -----BEGIN...END----- block)"; exit 1
          fi
          # known_hosts is best-effort; the rsync/ssh steps use StrictHostKeyChecking=no.
          # Non-fatal so an unreachable host surfaces as a real error at rsync, not here.
          ssh-keyscan -H "${{ secrets.PROD_HOST }}" >> ~/.ssh/known_hosts 2>&1 \
            || echo "::warning::ssh-keyscan could not reach ${{ secrets.PROD_HOST }}:22 — check Oracle security list allows inbound SSH from GitHub runner IPs"

      - name: Upload frontend dist to server
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            ./dist/ \
            ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }}:/tmp/stellar-dist/

      - name: Run server-side deploy script
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }} \
            'bash -s' < scripts/prod-deploy.sh

      - name: Smoke test
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.skip_smoke_test }}
        run: bash scripts/smoke-test.sh https://stellaredu.in

      - name: Auto-rollback on failure
        if: failure()
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }} \
            'bash -s' < scripts/prod-rollback.sh

      - name: Summary
        if: success()
        run: |
          echo "## ✅ Production deploy complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: https://stellaredu.in" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
