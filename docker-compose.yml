version: "3.9"

services:
  # ── MongoDB ───────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: ai_learning
    deploy:
      resources:
        limits:
          memory: 512m
    healthcheck:
      test: ["CMD-SHELL", "echo 'db.adminCommand(\"ping\").ok' | mongosh --quiet 2>/dev/null | grep -q 1"]
      interval: 30s
      timeout: 25s
      retries: 5
      start_period: 40s

  # ── Redis ─────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes  # persistence enabled
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          memory: 128m
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Backend API ───────────────────────────────────────────────────
  api:
    image: ghcr.io/arafat233/ailearningpath-api:latest
    build:
      context: ./ai-learning-backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5001:5001"
    deploy:
      resources:
        limits:
          memory: 512m
    environment:
      NODE_ENV: production
      PORT: 5001
      MONGO_URI: mongodb://mongo:27017/ai_learning
      REDIS_URL: redis://redis:6379
      # Core secrets
      JWT_SECRET: ${JWT_SECRET}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-haiku-4-5-20251001}
      MONTHLY_TOKEN_BUDGET: ${MONTHLY_TOKEN_BUDGET:-10000000}
      # URLs
      FRONTEND_URL: ${FRONTEND_URL:-https://stellaredu.in}
      BACKEND_URL: ${BACKEND_URL:-https://stellaredu.in}
      SITE_URL: ${SITE_URL:-https://stellaredu.in}
      # Google OAuth
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      # Razorpay
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET}
      # Email
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_FROM: ${RESEND_FROM}
      # Web Push
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_EMAIL: ${VAPID_EMAIL}
      # Company dashboard
      COMPANY_ADMIN_EMAIL: ${COMPANY_ADMIN_EMAIL}
      COMPANY_ADMIN_PASSWORD: ${COMPANY_ADMIN_PASSWORD}
      COMPANY_JWT_SECRET: ${COMPANY_JWT_SECRET}
      # Pro track (pilot) — allowlist emails for early access
      PRO_TRACKS_ENABLED_FOR_EMAILS: "najeebarafat@gmail.com, salmasiddiqua@stellar.dev"
      # Error monitoring
      SENTRY_DSN: ${SENTRY_DSN:-}
    depends_on:
      mongo:
        condition: service_started
      redis:
        condition: service_started

volumes:
  mongo_data:
  redis_data:
