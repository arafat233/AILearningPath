version: "3.9"

services:
  # ── MongoDB ───────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: ai_learning
    ports:
      - "27017:27017"   # remove in production — only expose to internal network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes  # persistence enabled
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"     # remove in production
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Backend API ───────────────────────────────────────────────────
  api:
    build:
      context: ./ai-learning-backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/ai_learning
      REDIS_URL: redis://redis:6379
      # Secrets — set these in .env or your deployment platform's secret manager
      JWT_SECRET: ${JWT_SECRET}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-haiku-4-5-20251001}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  mongo_data:
  redis_data:
